# Esta VPS já hospeda outro sistema (tvplay-web) com nginx-proxy + acme-companion
# rodando nas portas 80/443. Em vez de subir nosso próprio Nginx/certbot, conectamos
# nossos containers à rede do nginx-proxy existente e deixamos ele detectar e gerar
# o virtual host + certificado Let's Encrypt automaticamente via variáveis de ambiente
# (VIRTUAL_HOST / LETSENCRYPT_HOST). Ver DEPLOY.md para o passo a passo completo.
#
# Build a partir da RAIZ do projeto (não de ./backend) — o backend/Dockerfile.prod
# também empacota o build do frontend e o serve via Express (express.static),
# evitando o problema de rotear /api e / para containers diferentes no mesmo domínio.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_NOME: ${ADMIN_NOME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
      VIRTUAL_HOST: ${DOMINIO}
      LETSENCRYPT_HOST: ${DOMINIO}
      VIRTUAL_PORT: 3001
    depends_on:
      - db
    networks:
      - default
      - tvplay-web_default
    restart: unless-stopped

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    # Sem "ports": o MySQL não deve ficar exposto à internet, só acessível pela
    # rede interna do compose. Também NÃO entra na rede tvplay-web_default —
    # fica isolado, só "backend" e "adminer" o alcançam via nome "db".

  adminer:
    # phpmyadmin/phpmyadmin só publica imagem amd64 (sem build ARM64) — em VPS ARM64
    # falha com "exec format error" mesmo com emulação. Adminer tem imagem oficial
    # multi-arch (inclui arm64) e cobre a mesma necessidade (consultar/editar tabelas).
    image: adminer
    environment:
      ADMINER_DEFAULT_SERVER: db
      VIRTUAL_HOST: phpmyadmin-vm2026.${DOMINIO_BASE}
      LETSENCRYPT_HOST: phpmyadmin-vm2026.${DOMINIO_BASE}
      VIRTUAL_PORT: 8080
    depends_on:
      - db
    networks:
      - default
      - tvplay-web_default
    restart: unless-stopped
    # Subdomínio próprio (não path) — nginx-proxy roteia por Host de forma confiável,
    # diferente de VIRTUAL_PATH para containers diferentes no mesmo host. Sem auth_basic
    # própria aqui (não temos Nginx nosso) — proteger com senha forte do MySQL e
    # considerar restringir por firewall/IP se exposto à internet por muito tempo.

networks:
  tvplay-web_default:
    external: true

volumes:
  db_data:
