server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota não encontrada cai no index.html (react-router cuida do resto)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # assets com hash no nome podem ser cacheados de forma agressiva
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
