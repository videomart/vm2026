# Substitua "SEU_DOMINIO" pelo domínio real (ex.: vm2026.tvtupi.com.br) antes do deploy.
# Certificados gerados via certbot (Let's Encrypt) — ver README de deploy.

server {
    listen 80;
    server_name SEU_DOMINIO;

    # redireciona todo tráfego HTTP para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # necessário para a validação inicial do certbot (modo webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name SEU_DOMINIO;

    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;

    client_max_body_size 5m;

    # API do backend
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # phpMyAdmin — protegido por autenticação HTTP Basic além do login próprio
    location /phpmyadmin/ {
        auth_basic "Acesso restrito";
        auth_basic_user_file /etc/nginx/htpasswd/phpmyadmin;

        proxy_pass http://phpmyadmin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # frontend (build estático servido pelo container nginx do frontend)
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
